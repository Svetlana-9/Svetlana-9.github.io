<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="top">
    <p>Progress</p>
    <div class="progress">
      <div class="layer1"></div>
      <div class="layer2"></div>
      <div class="layer3"></div>
      <div class="center"></div>
    </div>
  </div>
  <div class="bottom">
    <div class="states">
      <div class="row">
        <input type="text" id="value">
        <label for="value">Value</label>
      </div>
      <div class="row">
        <input type="checkbox" id="switchAnimate">
        <label for="switchAnimate">Animate</label>
      </div>
      <div class="row">
        <input type="checkbox" id="switchHide">
        <label for="switchHide">Hide</label>
      </div>
    </div>
  </div>
  <script src="index.js"></script>
</body>

</html>
